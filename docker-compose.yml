version: "3.9"

services:
  # ── Training service ─────────────────────────────────────────────────────────
  # Run with:  docker compose --profile train up train
  # Writes model/*.pkl back to the host via the volume mount.
  train:
    build:
      context: .
      dockerfile: docker/Dockerfile.train
    volumes:
      - ./model:/app/model
    profiles:
      - train

  # ── Serving service ──────────────────────────────────────────────────────────
  # Run with:  docker compose up serve
  # Reads model/*.pkl from the host via the volume mount.
  serve:
    build:
      context: .
      dockerfile: docker/Dockerfile.serve
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - ./model:/app/model
